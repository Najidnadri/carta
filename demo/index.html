<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carta demo</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0e1116;
        color: #c9d1d9;
        font-family: system-ui, sans-serif;
      }
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid #1f2630;
        display: flex;
        gap: 12px;
        align-items: center;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      header button {
        background: #1f2630;
        color: #c9d1d9;
        border: 1px solid #2d333b;
        border-radius: 4px;
        padding: 4px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      header button:hover {
        background: #2d333b;
      }
      #readout {
        margin-left: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #8b949e;
        display: flex;
        gap: 14px;
      }
      #readout span b {
        color: #c9d1d9;
        font-weight: 500;
      }
      #app > *:nth-child(2) {
        min-height: 0;
      }
      #chart {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Carta</h1>
        <button id="remount">Remount chart</button>
        <button id="reset-view">Reset view</button>
        <div id="readout">
          <span>start <b id="readout-start">—</b></span>
          <span>end <b id="readout-end">—</b></span>
          <span>width <b id="readout-width">—</b></span>
          <span>domain <b id="readout-domain">—</b></span>
        </div>
      </header>
      <div id="chart"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
