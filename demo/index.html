<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carta demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e1116;
        --fg: #c9d1d9;
        --muted: #8b949e;
        --border: #1f2630;
        --button-bg: #1f2630;
        --button-border: #2d333b;
        --button-bg-hover: #2d333b;
        --panel-bg: #0b0f15;
      }
      [data-theme="light"] {
        color-scheme: light;
        --bg: #ffffff;
        --fg: #24292f;
        --muted: #57606a;
        --border: #d0d7de;
        --button-bg: #f6f8fa;
        --button-border: #d0d7de;
        --button-bg-hover: #eaeef2;
        --panel-bg: #f6f8fa;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: system-ui, sans-serif;
        transition: background-color 120ms linear, color 120ms linear;
      }
      #app {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
      }
      header {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 12px;
        align-items: center;
      }
      header h1 {
        margin: 0;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      header button {
        background: var(--button-bg);
        color: var(--fg);
        border: 1px solid var(--button-border);
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 12px;
        min-height: 44px;
        min-width: 44px;
        cursor: pointer;
      }
      header button:hover {
        background: var(--button-bg-hover);
      }
      /* Phase 13 Cycle B.2 fix-up F-4 — ensure drawing toolbar buttons hit
         the WCAG 2.5.5 44×44 CSS-px minimum on every viewport. */
      #drawings-toolbar button {
        min-width: 44px;
        min-height: 44px;
      }
      /* Phase 13 Cycle B.3 — long-press / right-click context menu.  Anchors
         off `drawing:contextmenu` event (host-rendered DOM, library only emits). */
      #drawing-context-menu {
        position: fixed;
        z-index: 1000;
        background: var(--panel-bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 6px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
        padding: 4px;
        min-width: 160px;
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        display: none;
      }
      #drawing-context-menu[data-open="true"] {
        display: block;
      }
      #drawing-context-menu button {
        display: block;
        width: 100%;
        text-align: left;
        background: transparent;
        color: inherit;
        border: 0;
        border-radius: 4px;
        padding: 8px 10px;
        font: inherit;
        cursor: pointer;
        min-height: 36px;
      }
      #drawing-context-menu button:hover,
      #drawing-context-menu button:focus {
        background: var(--button-bg-hover);
        outline: none;
      }
      #readout {
        margin-left: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 6px 14px;
      }
      #readout span b {
        color: var(--fg);
        font-weight: 500;
      }
      #app > *:nth-child(2) {
        min-height: 0;
      }
      #stage {
        display: grid;
        grid-template-columns: 1fr 280px;
        min-height: 0;
        height: 100%;
      }
      #chart {
        width: 100%;
        height: 100%;
        min-height: 0;
      }
      #crosshair-panel {
        border-left: 1px solid var(--border);
        background: var(--panel-bg);
        color: var(--fg);
        padding: 12px 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        overflow-y: auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #request-log-section {
        border-top: 1px solid var(--border);
        padding-top: 8px;
      }
      #request-log-section h2 {
        margin: 0 0 6px 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      #request-log-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }
      #request-log-table th,
      #request-log-table td {
        text-align: left;
        padding: 3px 4px;
        border-bottom: 1px solid var(--border);
      }
      #request-log-table td.channel {
        word-break: break-word;
      }
      #request-log-table td.range,
      #request-log-table td.at {
        white-space: nowrap;
      }
      #request-log-table th {
        color: var(--muted);
        font-weight: 500;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      #request-log-table tr[data-source="cache-hit-synthetic"] td.source {
        color: #58a6ff;
      }
      #request-log-table tr[data-source="data:request"] td.source {
        color: #f0883e;
      }
      #request-log-footer {
        color: var(--muted);
        font-size: 10px;
        margin-top: 4px;
      }
      #crosshair-panel h2 {
        margin: 0 0 8px 0;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      #crosshair-panel dl {
        margin: 0 0 12px 0;
        display: grid;
        grid-template-columns: auto 1fr;
        row-gap: 4px;
        column-gap: 10px;
      }
      /* Phase 13 Cycle B.2 fix-up F-1 — `display: grid` above overrides the
         `hidden` boolean attribute. Restore the default `[hidden]` semantics. */
      #crosshair-panel dl[hidden] {
        display: none;
      }
      #crosshair-panel dt {
        color: var(--muted);
      }
      #crosshair-panel dd {
        margin: 0;
        color: var(--fg);
        text-align: right;
      }
      #crosshair-panel[data-active="false"] dd {
        color: var(--muted);
        opacity: 0.6;
      }
      #crosshair-panel .series-row {
        border-top: 1px solid var(--border);
        padding-top: 8px;
        margin-top: 8px;
      }
      #crosshair-panel .series-row header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0;
        border: none;
      }
      #crosshair-panel .series-row .series-name {
        color: var(--fg);
        font-weight: 500;
      }
      #crosshair-panel .series-row .series-kind {
        color: var(--muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      #crosshair-panel .series-row .series-values {
        display: grid;
        grid-template-columns: auto 1fr;
        row-gap: 2px;
        column-gap: 10px;
        margin-top: 4px;
      }
      #crosshair-panel .series-row .series-values span.label {
        color: var(--muted);
      }
      #crosshair-panel .series-row .series-values span.value {
        color: var(--fg);
        text-align: right;
      }
      #crosshair-panel[data-active="false"] .series-row .series-values span.value {
        color: var(--muted);
        opacity: 0.6;
      }
      @media (max-width: 700px) {
        html,
        body {
          height: auto;
          min-height: 100%;
        }
        #app {
          height: auto;
          min-height: 100svh;
          grid-template-rows: auto auto auto;
        }
        #stage {
          grid-template-columns: 1fr;
          grid-template-rows: minmax(50svh, 1fr) auto;
        }
        #chart {
          min-height: 50svh;
        }
        #crosshair-panel {
          border-left: none;
          border-top: 1px solid var(--border);
          max-height: none;
        }
        header select,
        header label {
          min-height: 44px;
        }
        header select {
          padding: 10px 8px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Carta</h1>
        <button id="remount">Remount chart</button>
        <button id="reset-view">Reset view</button>
        <button id="auto-scale" aria-pressed="false">Auto-scale: OFF</button>
        <button id="load-data">Load synthetic data</button>
        <button id="clear-cache">Clear cache</button>
        <button id="auto-supply" aria-pressed="false">Auto-supply: OFF</button>
        <button id="toggle-markers" aria-pressed="false">Markers: OFF</button>
        <button id="toggle-theme" aria-pressed="false">Theme: Dark</button>
        <button id="toggle-live-tick" aria-pressed="false">Live tick: OFF</button>
        <fieldset id="drawings-toolbar" style="border:1px solid var(--button-border);border-radius:4px;padding:4px 6px;display:inline-flex;gap:4px;align-items:center;">
          <legend style="font-size:10px;color:var(--muted);padding:0 4px;text-transform:uppercase;letter-spacing:0.06em;">Draw</legend>
          <button id="draw-trendline" aria-pressed="false" title="Trendline (Alt+T)">/</button>
          <button id="draw-horizontalLine" aria-pressed="false" title="Horizontal line (Alt+H)">—</button>
          <button id="draw-verticalLine" aria-pressed="false" title="Vertical line (Alt+V)">|</button>
          <button id="draw-rectangle" aria-pressed="false" title="Rectangle (Alt+R)">▭</button>
          <button id="draw-fibRetracement" aria-pressed="false" title="Fib retracement (Alt+F)">F</button>
          <button id="draw-ray" aria-pressed="false" title="Ray (Alt+Y)">→</button>
          <button id="draw-extendedLine" aria-pressed="false" title="Extended line (Alt+E)">↔</button>
          <button id="draw-horizontalRay" aria-pressed="false" title="Horizontal ray (Alt+G)">⇒</button>
          <button id="draw-parallelChannel" aria-pressed="false" title="Parallel channel (Alt+P)">⫽</button>
          <button id="draw-longPosition" aria-pressed="false" title="Long position (Alt+Shift+L)">L⤴</button>
          <button id="draw-shortPosition" aria-pressed="false" title="Short position (Alt+Shift+S)">S⤵</button>
          <button id="draw-text" aria-pressed="false" title="Text / note (Alt+N)">T</button>
          <button id="draw-callout" aria-pressed="false" title="Callout (Alt+B)">💬</button>
          <button id="draw-arrow" aria-pressed="false" title="Arrow (Alt+W)">➤</button>
          <button id="draw-dateRange" aria-pressed="false" title="Date range (Alt+D)">↔t</button>
          <button id="draw-priceRange" aria-pressed="false" title="Price range (Alt+M)">↔$</button>
          <button id="draw-priceDateRange" aria-pressed="false" title="Price+date range (Alt+K)">▭$t</button>
          <button id="draw-pitchfork" aria-pressed="false" title="Pitchfork (Alt+Shift+P)">⫶</button>
          <select id="pitchfork-variant" title="Pitchfork variant" style="background:var(--button-bg);color:var(--fg);border:1px solid var(--button-border);border-radius:4px;padding:2px 4px;font-size:11px;">
            <option value="andrews">Andrews</option>
            <option value="schiff">Schiff</option>
            <option value="modifiedSchiff">Mod. Schiff</option>
          </select>
          <button id="draw-gannFan" aria-pressed="false" title="Gann fan (Alt+Shift+G)">𝍤</button>
          <button id="draw-ellipse" aria-pressed="false" title="Ellipse / circle (Alt+O)">◯</button>
          <button id="drawings-magnet" aria-pressed="false" title="Toggle magnet snap (Off → Weak → Strong)">Magnet: Off</button>
          <button id="drawings-clear" title="Clear all drawings">×</button>
          <button id="drawings-save" title="Save drawings to localStorage">Save</button>
          <button id="drawings-load" title="Load drawings from localStorage">Load</button>
        </fieldset>
        <label for="interval-select" style="font-size: 12px; color: var(--muted);">
          Interval
          <select id="interval-select" style="background:var(--button-bg);color:var(--fg);border:1px solid var(--button-border);border-radius:4px;padding:3px 6px;font-size:12px;margin-left:4px;">
            <option value="60000">1m</option>
            <option value="300000">5m</option>
            <option value="3600000">1h</option>
            <option value="86400000">1D</option>
          </select>
        </label>
        <label for="overlay-shape" style="font-size: 12px; color: var(--muted);">
          Overlay
          <select id="overlay-shape" style="background:var(--button-bg);color:var(--fg);border:1px solid var(--button-border);border-radius:4px;padding:3px 6px;font-size:12px;margin-left:4px;">
            <option value="line">Line</option>
            <option value="area">Area</option>
            <option value="baseline">Baseline</option>
          </select>
        </label>
        <label for="line-style" style="font-size: 12px; color: var(--muted);">
          SMA
          <select id="line-style" style="background:var(--button-bg);color:var(--fg);border:1px solid var(--button-border);border-radius:4px;padding:3px 6px;font-size:12px;margin-left:4px;">
            <option value="solid-simple">Solid</option>
            <option value="dashed-simple">Dashed</option>
            <option value="dotted-simple">Dotted</option>
            <option value="solid-stepped">Stepped</option>
            <option value="dashed-stepped">Dashed stepped</option>
          </select>
        </label>
        <label for="primary-series-type" style="font-size: 12px; color: var(--muted);">
          Primary
          <select id="primary-series-type" style="background:var(--button-bg);color:var(--fg);border:1px solid var(--button-border);border-radius:4px;padding:3px 6px;font-size:12px;margin-left:4px;">
            <option value="candle">Candles</option>
            <option value="ohlc-bar">OHLC bars</option>
            <option value="heikin-ashi">Heikin-Ashi</option>
          </select>
        </label>
        <div id="readout">
          <span>start <b id="readout-start">—</b></span>
          <span>end <b id="readout-end">—</b></span>
          <span>width <b id="readout-width">—</b></span>
          <span>domain <b id="readout-domain">—</b></span>
          <span>cache <b id="readout-cache">—</b></span>
          <span>evt <b id="readout-events">—</b></span>
        </div>
      </header>
      <div id="stage">
        <div id="chart"></div>
        <aside id="crosshair-panel" data-active="false" aria-label="Crosshair readout">
          <h2>Crosshair</h2>
          <dl>
            <dt>status</dt><dd id="cx-status">idle</dd>
            <dt>time</dt><dd id="cx-time">—</dd>
            <dt>price</dt><dd id="cx-price">—</dd>
            <dt>point</dt><dd id="cx-point">—</dd>
            <dt>emits</dt><dd id="cx-emits">0</dd>
          </dl>
          <section id="series-readouts" aria-label="Series values at crosshair">
            <!-- populated by main.ts -->
          </section>
          <section id="position-pnl-section" aria-label="Position-tool P&amp;L readout">
            <h2>Position P&amp;L</h2>
            <dl id="position-pnl-empty"><dt>—</dt><dd>no position selected</dd></dl>
            <dl id="position-pnl-detail" hidden>
              <dt>side</dt><dd id="pnl-side">—</dd>
              <dt>entry</dt><dd id="pnl-entry">—</dd>
              <dt>SL</dt><dd id="pnl-sl">—</dd>
              <dt>TP</dt><dd id="pnl-tp">—</dd>
              <dt>R:R</dt><dd id="pnl-rr">—</dd>
              <dt>qty</dt><dd id="pnl-qty">—</dd>
              <dt>last</dt><dd id="pnl-last">—</dd>
              <dt>uPnL</dt><dd id="pnl-upnl">—</dd>
            </dl>
          </section>
          <section id="request-log-section" aria-label="Per-channel data-request log">
            <h2>Request log</h2>
            <table id="request-log-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>t</th>
                  <th>channel</th>
                  <th>kind</th>
                  <th>ivl</th>
                  <th>range</th>
                  <th>src</th>
                </tr>
              </thead>
              <tbody id="request-log-tbody">
                <!-- populated by request-log.ts -->
              </tbody>
            </table>
            <div id="request-log-footer">0 / 50 · #0</div>
          </section>
        </aside>
      </div>
    </div>
    <div id="drawing-context-menu" role="menu" aria-label="Drawing actions" data-open="false">
      <button type="button" data-action="duplicate" role="menuitem">Duplicate</button>
      <button type="button" data-action="lock" role="menuitem">Toggle lock</button>
      <button type="button" data-action="bring-front" role="menuitem">Bring to front</button>
      <button type="button" data-action="delete" role="menuitem">Delete</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
